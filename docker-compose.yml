services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deploycore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deploycore}
      POSTGRES_DB: ${POSTGRES_DB:-deploycore}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deploycore}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts
      - iso_storage:/data/isos
      - iso_build_tmp:/data/iso_build_tmp
      - app_asset_storage:/data/app_assets
      - app_asset_build_tmp:/data/app_asset_build_tmp
      - db_backups:/data/backups
      - tls_certs:/data/tls
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/backend
      - ./worker:/app
      - iso_storage:/data/isos
      - iso_build_tmp:/data/iso_build_tmp
      - db_backups:/data/backups
    command: arq worker.main.WorkerSettings

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  proxy:
    build: ./proxy
    env_file: .env
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - tls_certs:/data/tls
      - caddy_data:/data
    restart: unless-stopped

  updater:
    build: ./updater
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/repo
    depends_on:
      postgres:
        condition: service_healthy

  # Remote Management backend, native stack (see remote-agent/README.md and
  # remote-agent/PROTOCOL.md - no RustDesk anywhere in this any more):
  # coturn is STUN/TURN for the rare case a managed host isn't on the same
  # LAN as this server (ICE tries a direct path first always); guacd is
  # Apache Guacamole's daemon, wraps FreeRDP for the "Connect" (native RDP)
  # mode. Both internal-only except coturn's own STUN/TURN ports, which
  # (like the old RELAY_PORTS) need forwarding only for non-LAN access -
  # see the setup banner.
  coturn:
    # Thin wrapper over the stock image (see coturn/entrypoint.sh) - resolves
    # TURN_HOST to a real IP and passes it as --external-ip, without which
    # coturn advertises its own Docker-internal address as the relay
    # candidate and the TURN path silently doesn't work for anyone reached
    # through NAT, even with every port correctly forwarded.
    build: ./coturn
    env_file: .env
    # Static long-term credentials (TURN_USERNAME/TURN_PASSWORD in .env) -
    # deliberately not the fancier time-limited REST-API credential scheme
    # coturn also supports. That scheme exists for multi-tenant public TURN
    # services rotating credentials per caller; this is a single self-hosted
    # appliance where the operator already trusts every agent it enrolls, so
    # a fixed shared secret is the right amount of mechanism, not a missing one.
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    restart: unless-stopped

  guacd:
    image: guacamole/guacd:1.5.5
    restart: unless-stopped

volumes:
  postgres_data:
  iso_storage:
  iso_build_tmp:
  app_asset_storage:
  app_asset_build_tmp:
  db_backups:
  tls_certs:
  caddy_data:
